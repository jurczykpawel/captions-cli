name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck
      - name: Unit tests
        run: bun test
      - name: Build standalone binary
        run: bun run build
      # Smoke-test the compiled binary. These subcommands don't need ffmpeg
      # or whisper, and they fail hard if the preset index imports a preset
      # that isn't shipped (guards the free-only public build).
      - name: CLI smoke test
        run: |
          ./dist/captions --help
          ./dist/captions --list-engines
          ./dist/captions --list-presets
          ./dist/captions --list-presets --engine hf

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build slim image (free pack)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.slim
          push: false
          tags: captions-cli:slim-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
