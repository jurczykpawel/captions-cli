name: Publish Docker images

# Builds and pushes the slim + full images to GHCR on every version tag.
# Creating a GitHub release (which creates the v* tag) triggers this.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: slim
            dockerfile: Dockerfile.slim
          - variant: full
            dockerfile: Dockerfile.full
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.variant }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
