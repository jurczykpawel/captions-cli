name: Publish Docker images

# Builds and pushes the slim + full images to GHCR on every version tag.
# Creating a GitHub release (which creates the v* tag) triggers this.
# slim is multi-arch (amd64 + arm64); full is amd64-only (the HF engine's
# Chromium toolchain doesn't cross-build cleanly under arm64 emulation).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: slim
            dockerfile: Dockerfile.slim
            platforms: linux/amd64,linux/arm64
          - variant: full
            dockerfile: Dockerfile.full
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.variant }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.variant }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
